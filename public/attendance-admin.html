<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Attendance Admin</title>
  <link rel="stylesheet" href="/public/css/attendance.css">
</head>
<body>
<main class="app">
  <section class="card">
    <img src="/public/images/logo.jpg" class="logo" alt="Asianloop">

    <h1>Attendance Admin</h1>

    <div class="history-controls">
      <select id="adminMonth"></select>
      <select id="adminYear"></select>
    </div>

    <div class="export-box">
  <h3>CSV Export</h3>

  <select id="exportStaff">
    <option value="all">All Staff</option>
  </select>

  <button id="downloadCsvBtn" type="button">
    Download CSV
  </button>
</div>

    <div class="summary-card" id="adminSummary">Loading...</div>
    <div class="summary-card" id="dailySummary">
  Loading today’s status...
</div>

<div class="export-box">
  <h3>Attendance Records</h3>

  <select id="recordView">
    <option value="today">Today Only</option>
    <option value="month">Selected Month</option>
    <option value="outside">Outside Office Only</option>
    <option value="late">Late Only</option>
    <option value="leave">On Leave Only</option>
  </select>
</div>
    
    <div id="adminRecords" class="records"></div>
  </section>
</main>

<script src="/public/js/attendance-admin.js"></script>
</body>
</html>
